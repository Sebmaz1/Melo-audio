<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mélo — Votre cadeau musical</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F5F0EB;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1A1714;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    text-align: center;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 32px; color: #FAF7F2; margin-bottom: 32px; }
  .logo span { color: #C4714A; }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 500; color: #FAF7F2; margin-bottom: 12px; line-height: 1.4; }
  .from { font-size: 14px; color: rgba(250,247,242,0.45); margin-bottom: 24px; font-style: italic; }
  .message {
    background: rgba(250,247,242,0.06);
    border-left: 3px solid #C4714A;
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 15px;
    color: rgba(250,247,242,0.7);
    line-height: 1.7;
    margin-bottom: 28px;
    text-align: left;
    display: none;
    font-style: italic;
  }
  .player-wrap {
    background: rgba(250,247,242,0.06);
    border: 1px solid rgba(250,247,242,0.1);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .play-btn {
    width: 64px; height: 64px;
    background: #C4714A;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .play-btn:hover { background: #B5623B; transform: scale(1.05); }
  .play-btn svg { width: 28px; height: 28px; fill: white; margin-left: 3px; }
  .pause-icon { display: none; }
  .play-btn.playing .play-icon { display: none; }
  .play-btn.playing .pause-icon { display: block; }
  .bars {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 3px; height: 24px; margin-bottom: 8px;
  }
  .bar {
    width: 3px; background: #C4714A; border-radius: 2px;
    opacity: 0.4; height: 4px; transition: height 0.1s;
  }
  .playing-label { font-size: 13px; color: rgba(250,247,242,0.4); }
  @keyframes wave {
    0% { height: 4px; } 100% { height: 20px; }
  }
  .bar.active:nth-child(1) { animation: wave 0.6s ease-in-out infinite alternate; opacity: 1; }
  .bar.active:nth-child(2) { animation: wave 0.6s ease-in-out infinite alternate 0.1s; opacity: 1; }
  .bar.active:nth-child(3) { animation: wave 0.6s ease-in-out infinite alternate 0.2s; opacity: 1; }
  .bar.active:nth-child(4) { animation: wave 0.6s ease-in-out infinite alternate 0.05s; opacity: 1; }
  .bar.active:nth-child(5) { animation: wave 0.6s ease-in-out infinite alternate 0.15s; opacity: 1; }
  .bar.active:nth-child(6) { animation: wave 0.6s ease-in-out infinite alternate 0.25s; opacity: 1; }
  .bar.active:nth-child(7) { animation: wave 0.6s ease-in-out infinite alternate 0.08s; opacity: 1; }
  .download {
    display: inline-flex; align-items: center; gap: 8px;
    color: rgba(250,247,242,0.4); font-size: 13px; text-decoration: none;
    margin-top: 4px; transition: color 0.2s;
    padding: 8px 16px; border: 1px solid rgba(250,247,242,0.1); border-radius: 8px;
  }
  .download:hover { color: #C9A96E; border-color: rgba(201,169,110,0.3); }
  .footer { margin-top: 28px; font-size: 12px; color: rgba(250,247,242,0.2); }
  .footer a { color: #C4714A; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">M<span>é</span>lo</div>
  <div class="icon">🎁</div>
  <h1 id="title">Une chanson rien que pour vous</h1>
  <p class="from" id="from"></p>
  <div class="message" id="message"></div>

  <div class="player-wrap" onclick="togglePlay()">
    <button class="play-btn" id="playBtn">
      <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg class="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="bars" id="bars">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
      <div class="bar" id="b5"></div>
      <div class="bar" id="b6"></div>
      <div class="bar" id="b7"></div>
    </div>
    <div class="playing-label" id="label">Appuyez pour écouter</div>
  </div>

  <a class="download" id="dl" href="#" download>⬇ Télécharger la chanson</a>
  <div class="footer">Créé avec ♥ par <a href="https://melo.gift">Mélo</a></div>
</div>

<script>
  var audio = new Audio();
  var playing = false;
  var params = new URLSearchParams(window.location.search);
  var mp3 = params.get('mp3') || '';
  var from = params.get('from') || '';
  var dest = params.get('dest') || '';
  var msg = params.get('msg') || '';

  if (dest) document.getElementById('title').textContent = '🎵 Une chanson pour ' + dest;
  if (from) document.getElementById('from').textContent = 'Offerte avec amour par ' + from;
  if (msg && msg.trim()) {
    var m = document.getElementById('message');
    m.textContent = '" ' + msg + ' "';
    m.style.display = 'block';
  }
  if (mp3) {
    audio.src = mp3;
    audio.preload = 'auto';
    audio.crossOrigin = 'anonymous';
    document.getElementById('dl').href = mp3;
  }

  audio.onended = function() { setPlaying(false); };

  function togglePlay() {
    if (!mp3) return;
    if (playing) {
      audio.pause();
      setPlaying(false);
    } else {
      audio.play().catch(function(e) { console.log(e); });
      setPlaying(true);
    }
  }

  function setPlaying(state) {
    playing = state;
    var btn = document.getElementById('playBtn');
    var bars = document.querySelectorAll('.bar');
    var label = document.getElementById('label');
    if (state) {
      btn.classList.add('playing');
      bars.forEach(function(b) { b.classList.add('active'); });
      label.textContent = 'En cours de lecture...';
    } else {
      btn.classList.remove('playing');
      bars.forEach(function(b) { b.classList.remove('active'); });
      label.textContent = 'Appuyez pour écouter';
    }
  }
</script>
</body>
</html>
